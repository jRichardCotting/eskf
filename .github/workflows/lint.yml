name: lint

on:
  push:
  pull_request:

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate the example bundle against ESKF v0.1
        run: python3 tools/eskf-lint/eskf_lint.py examples/minimal-bundle --strict
